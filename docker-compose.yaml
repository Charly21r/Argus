services:

  api:
    depends_on:
      - mlflow
    build: .
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=models/text_toxicity/artifacts/model
    ports:
      - "8000:8000"

  mlflow:
    build: ./mlflow_server
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/mlflow.db
  
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards