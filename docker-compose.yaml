services:

  api:
    build: .
    env_file:
      - .env
    environment:
      # Set CMS_SERVING__MODEL_URI to a registry URI to pull from Databricks:
      #   CMS_SERVING__MODEL_URI=models:/workspace.default.content-moderation-text@Production
      # Leave unset to load from the local volume path below.
      - CMS_SERVING__MODEL_URI=${CMS_SERVING__MODEL_URI:-}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-}
      - DATABRICKS_HOST=${DATABRICKS_HOST:-}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN:-}
    volumes:
      # Local model cache — used when CMS_SERVING__MODEL_URI is unset
      - ./models:/app/models
    ports:
      - "8000:8000"

  mlflow:
    build: ./mlflow_server
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/mlflow.db
  
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards