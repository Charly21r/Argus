name: 'CI'
on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'

jobs:
  checks:
    name: 'Lint, Typecheck, Test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Unit tests
        run: make test-unit
